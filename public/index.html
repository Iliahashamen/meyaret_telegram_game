<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#050510" />
  <title>MEYARET</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="config.js"></script>
</head>
<body>
  <!-- Loading Screen -->
  <div id="loading-screen">
    <div class="logo-text">MEYARET</div>
    <div class="loading-bar-wrap"><div class="loading-bar" id="loading-bar"></div></div>
    <div class="loading-label" id="loading-label">INITIALIZING SYSTEMS...</div>
    <div id="loading-status" style="font-size:0.45rem;color:#00ffcc;margin-top:8px;letter-spacing:0.05em;min-height:1.2em;text-align:center;"></div>
    <div id="loading-madeby">MADE BY SHAMEN</div>
  </div>

  <!-- Onboarding: Choose Call Sign -->
  <div id="onboarding-screen" class="screen hidden">
    <div class="screen-title">ENTER YOUR CALL SIGN</div>
    <div class="screen-sub">One word · letters & numbers only</div>
    <div class="example-tag">e.g. PHOENIX</div>
    <input id="callsign-input" type="text" maxlength="12"
           placeholder="PHOENIX" autocomplete="off" spellcheck="false" />
    <button id="callsign-confirm" class="btn-primary">CONFIRM</button>
    <div id="callsign-error" class="error-msg"></div>
  </div>

  <!-- Main Menu -->
  <div id="menu-screen" class="screen hidden">
    <!-- Profile badge (top right) -->
    <button id="profile-btn" class="profile-badge">
      <span id="menu-nickname">ACE</span>
      <span id="menu-shmips" class="shmips-count">0 $$</span>
    </button>

    <!-- Top 5 button (top left) -->
    <button id="leaderboard-strip" type="button">TOP 5</button>

    <div class="logo-menu">MEYARET</div>
    <div class="logo-trust">WE TRUST YOU <span id="menu-trust-name">PILOT</span></div>

    <div class="menu-buttons">
      <button id="btn-play" class="btn-primary btn-big">PLAY</button>
      <div class="spin-menu-wrap">
        <button id="btn-spin" class="btn-secondary btn-big">GIFT</button>
        <div id="menu-spin-timer" class="menu-spin-timer"></div>
      </div>
      <button id="btn-store" class="btn-secondary btn-big">STORE</button>
      <button id="btn-arsenal" class="btn-secondary btn-big">ARSENAL</button>
      <button id="btn-quit" class="btn-ghost btn-big">QUIT</button>
    </div>

    <div id="multiplier-banner" class="hidden"></div>
    <button id="mute-btn" class="mute-btn" title="Volume">VOL HIGH</button>
    <button id="btn-guide" class="guide-btn" title="Guide">GUIDE</button>
  </div>

  <!-- Top 5 Themed Modal -->
  <div id="top5-modal" class="top5-modal hidden">
    <div class="top5-backdrop"></div>
    <div class="top5-panel">
      <div class="top5-title">TOP 5 PILOTS</div>
      <div id="top5-entries" class="top5-entries"></div>
      <button id="top5-close" class="btn-primary">OK</button>
    </div>
  </div>

  <!-- Profile Screen -->
  <div id="profile-screen" class="screen hidden">
    <button class="back-btn" data-back="menu">BACK</button>
    <div class="screen-title">PROFILE</div>
    <div class="profile-card">
      <div class="profile-nick" id="prof-nick">ACE</div>
      <div class="profile-stats">
        <div class="stat"><span class="stat-label">SHMIPS</span><span id="prof-shmips">0</span></div>
        <div class="stat"><span class="stat-label">BEST SCORE</span><span id="prof-best">0</span></div>
        <div class="stat"><span class="stat-label">GAMES PLAYED</span><span id="prof-games">0</span></div>
      </div>
    </div>
    <button id="change-nick-btn" class="btn-secondary">CHANGE CALL SIGN (1,000 $$)</button>
    <div id="change-nick-area" class="hidden">
      <input id="new-nick-input" type="text" maxlength="12" placeholder="NEW CALL SIGN" />
      <button id="new-nick-confirm" class="btn-primary">CONFIRM</button>
      <div id="new-nick-error" class="error-msg"></div>
    </div>
  </div>

  <!-- Arsenal Screen -->
  <div id="arsenal-screen" class="screen hidden">
    <button class="back-btn" data-back="menu">BACK</button>
    <div class="screen-title">ARSENAL</div>
    <div class="profile-card">
      <div class="top-scores-label">LOADOUT</div>
      <div class="profile-stats" style="gap:8px;flex-wrap:wrap;">
        <div class="stat"><span class="stat-label">JET</span><span id="ars-jet">STARTER</span></div>
        <div class="stat"><span class="stat-label">WEAPON</span><span id="ars-weapon">STANDARD</span></div>
        <div class="stat"><span class="stat-label">SKIN</span><span id="ars-skin">DEFAULT</span></div>
      </div>
      <div style="font-size:7px;color:var(--muted2);margin-top:8px;letter-spacing:1px;line-height:2;" id="ars-ability"></div>
    </div>
    <div id="ars-equip-area" class="ars-equip-area"></div>
    <button id="arsenal-open-store" class="btn-primary">OPEN STORE</button>
  </div>

  <!-- Gift Screen -->
  <div id="spin-screen" class="screen hidden">
    <button class="back-btn" data-back="menu">BACK</button>
    <div class="screen-title">GIFT BOX</div>
    <div id="gift-box-area">
      <div id="gift-box" class="gift-idle">
        <div id="gift-lid"></div>
        <div id="gift-body">
          <div class="gift-ribbon-h"></div>
          <div class="gift-ribbon-v"></div>
        </div>
      </div>
      <div id="gift-sparks"></div>
    </div>
    <button id="spin-btn" class="btn-primary btn-big">OPEN GIFT</button>
    <div id="spin-countdown" class="spin-timer hidden"></div>
    <div id="spin-result" class="spin-result hidden"></div>
  </div>

  <!-- Store Screen -->
  <div id="store-screen" class="screen hidden">
    <button class="back-btn" data-back="menu">BACK</button>
    <div class="screen-title">STORE</div>
    <div id="store-balance" class="store-balance"></div>
    <div class="store-tabs">
      <button class="tab-btn active" data-tab="boost">BOOSTS</button>
      <button class="tab-btn" data-tab="upgrade">UPGRADES</button>
      <button class="tab-btn" data-tab="skin">SKINS</button>
      <button class="tab-btn" data-tab="plane">JETS</button>
    </div>
    <div id="store-items" class="store-grid"></div>
    <div id="store-msg" class="store-msg hidden"></div>
  </div>

  <!-- Guide Screen -->
  <div id="guide-screen" class="screen hidden">
    <button class="back-btn" data-back="menu">BACK</button>
    <div class="screen-title">GUIDE</div>
    <div id="guide-tabs" class="guide-tabs"></div>
    <div id="guide-body" class="guide-body"></div>
  </div>

  <!-- Game Canvas -->
  <canvas id="game-canvas"></canvas>

  <!-- Good Luck Splash (centered, shown for 2s on game start) -->
  <div id="goodluck-splash" class="goodluck-splash hidden"></div>

  <!-- Mobile Controls Overlay -->
  <div id="controls-overlay" class="hidden">
    <!-- Left: joystick only -->
    <div id="ctrl-left">
      <div id="vjoy-base">
        <div id="vjoy-knob"></div>
      </div>
    </div>
    <!-- Right: absolute-positioned panel matching user sketch
         Layout:
           [SHLD]    [FLARE]
                  [SHOOT big]
           [ROCKET]
                  [THRUST]
    -->
    <div id="ctrl-right">
      <button id="ctrl-shield" class="ctrl-abs ctrl-shield-btn">SHLD</button>
      <button id="ctrl-flare"  class="ctrl-abs ctrl-flare-btn">FLARE</button>
      <button id="ctrl-fire"   class="ctrl-abs ctrl-fire-btn">SHOOT</button>
      <button id="ctrl-rocket" class="ctrl-abs ctrl-rocket-btn">ROCKET</button>
      <button id="ctrl-thrust" class="ctrl-abs ctrl-thrust-btn">THRUST</button>
    </div>
  </div>

  <!-- Game Over -->
  <div id="gameover-screen" class="screen hidden">
    <div class="go-title" id="go-title">GAME OVER</div>
    <div class="go-score"  id="go-score"></div>
    <div class="go-shmips" id="go-shmips"></div>
    <div id="go-leaderboard"></div>
    <button id="go-play-again" class="btn-primary btn-big">PLAY AGAIN</button>
    <button id="go-menu"       class="btn-secondary btn-big">MAIN MENU</button>
  </div>

  <script type="module" src="sounds.js?v=20260311g"></script>
  <script type="module" src="game.js?v=20260311g"></script>
</body>
</html>
