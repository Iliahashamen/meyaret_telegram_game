name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Inject the Railway API URL into config.js so GitHub Pages
      # frontend knows where to send API calls.
      # Set RAILWAY_URL as a GitHub repo secret:
      #   Repo → Settings → Secrets → Actions → New secret
      #   Name: RAILWAY_URL   Value: https://your-app.up.railway.app
      - name: Inject API URL into config.js
        run: |
          if [ -n "${{ secrets.RAILWAY_URL }}" ]; then
            echo "window.MEYARET_API = '${{ secrets.RAILWAY_URL }}';" > public/config.js
            echo "Injected RAILWAY_URL into config.js"
          else
            echo "No RAILWAY_URL secret set — using same-origin (empty string)"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
