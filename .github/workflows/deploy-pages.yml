name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject Railway API URL into config.js
        run: |
          RAILWAY="${{ secrets.RAILWAY_URL }}"
          if [ -n "$RAILWAY" ]; then
            # Replace the placeholder with the actual Railway URL
            sed -i "s|__RAILWAY_URL__|${RAILWAY}|g" public/config.js
            echo "✓ Injected RAILWAY_URL: $RAILWAY"
          else
            echo "⚠ RAILWAY_URL secret not set — game will use same-origin fallback"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
